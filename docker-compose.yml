services:

  api:
    build:
      context: ./kitsune-komix-api
      dockerfile: ./Dockerfile
      target: dev
    container_name: kitsunekomix_api
    user: root  # Run as root to avoid permission issues with mounted volumes
    ports:
      - "8001:8001"  # API port
    volumes:
      - /Users/alexismontes/Documents/KitsuneKomix_Volumes/cache:/app/cache
      - /Users/alexismontes/Documents/KitsuneKomix_Volumes/comics:/app/comics
      - /Users/alexismontes/Documents/KitsuneKomix_Volumes/config:/app/config
      - ./kitsune-komix-api:/app  # For hot-reload in dev
      - api_node_modules:/app/node_modules  # Use separate volume for API
    environment:
      ENV: development
      PORT: 8001
      HOST: 0.0.0.0
      JWT_SECRET: "your_jwt_secret"
      JWT_REFRESH_SECRET: "your_jwt_secret"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - kitsune_network

  worker:
    build:
      context: ./kitsune-komix-api
      dockerfile: ./Dockerfile
      target: dev
    container_name: kitsunekomix_worker
    user: root
    command: ["deno", "task", "worker:dev"]
    volumes:
      - /Users/alexismontes/Documents/KitsuneKomix_Volumes/cache:/app/cache
      - /Users/alexismontes/Documents/KitsuneKomix_Volumes/comics:/app/comics
      - /Users/alexismontes/Documents/KitsuneKomix_Volumes/config:/app/config
      - ./kitsune-komix-api:/app
      - api_node_modules:/app/node_modules
    environment:
      ENV: development
      PORT: 8001
      HOST: 0.0.0.0
      JWT_SECRET: "your_jwt_secret"
      JWT_REFRESH_SECRET: "your_jwt_secret"
    restart: unless-stopped
    networks:
      - kitsune_network

  client:
    build:
      context: ./kitsune-komix-client
      target: dev
    container_name: kitsunekomix_client
    environment:
      # In dev, browser hits API on the host port mapping:
      VITE_API_BASE_URL: http://localhost:3000
      # For OpenAPI schema generation inside Docker, use the service name
      OPENAPI_URL: http://api:8001
      # Helpful for file watching on macOS/docker
      CHOKIDAR_USEPOLLING: "true"
      API_URL: http://localhost:8001
    volumes:
      - ./kitsune-komix-client:/app
      - client_node_modules:/app/node_modules
    ports:
      - "5173:5173"
      - "24678:24678" # HMR (vite sometimes uses this)
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kitsune_network

volumes:
  client_node_modules:
  api_node_modules:
  api_denocache:

networks:
  kitsune_network:
    driver: bridge
